services:
  netbox2prom:
    image: hamptik/netbox2prom:latest
    build: .
    restart: unless-stopped
    environment:
      NETBOX_TOKEN: ${NETBOX_TOKEN}
      ENABLE_PROMETHEUS: "true"
      ENABLE_ALLOY: "true"
      ENABLE_SYSLOG: "false"
      POLL_INTERVAL: "300"
      LOG_LEVEL: "INFO"
    volumes:
      - ./config.yml:/etc/netbox2prom/config.yml:ro
      - prometheus_scrape:/opt/configs/prometheus-scrape
      - alloy_targets:/etc/alloy
      - /etc/syslog-ng/conf.d:/etc/syslog-ng/conf.d

volumes:
  prometheus_scrape:
  alloy_targets:
