# ---------------------------------------------------------------------------
# Alloy / Blackbox targets generator
# ---------------------------------------------------------------------------
alloy:
  targets_file: /etc/alloy/blackbox_targets.json

  # Labels applied to every target unless overridden per group.
  # Set a label to null in a group to remove it for that group.
  default_labels:
    __param_module: icmp
    environment: prod
    request: icmp
    criticality: "{criticality}"
    name: "{name}"

  groups:
    # ---- Management devices (exclusive: skip remaining rules) ----
    management_icmp:
      exclusive: true
      conditions:
        tags_contains: [management]
        main_ip: not_null
      target_field: main_ip
      labels:
        device: management

    # ---- Linux / Windows servers with Alloy agent ----
    linux_windows_icmp:
      conditions:
        vendor: not_in
        vendor_exclude: [synology]
        main_ip: not_null
        os_type: not_null
        role: not_in
        role_exclude: [switch, ups, router]
      target_field: main_ip
      labels:
        os: "{os_type}"
        alloy: "true"
        node_ip: "{target_ip}"
        device: "{device_label}"

    # ---- Devices without Alloy agent ----
    icmp_no_alloy:
      conditions:
        vendor: not_in
        vendor_exclude: [synology]
        main_ip: not_null
        model: not_in
        model_exclude: [generic-ws]
        os_type: null
        role: not_in
        role_exclude: [locker, switch, ups, router, control_cpu, pps, ip-video, terminal, sound, video-transmission, wi-fi]
      target_field: main_ip
      labels:
        alloy: "false"
        node_ip: "{target_ip}"
        device: "{device_label}"

    # ---- IPMI / KVM (OOB IP) ----
    ipmi_kvm:
      conditions:
        virtual: false
        snmp_ver: 0
        oob_ip: not_null
      target_field: oob_ip
      name_suffix: "-kvm"
      labels:
        alloy: "false"
        node_ip: "{target_ip}"
        device: kvm

    # ---- Network switches/routers with SNMP ----
    switch_snmp:
      conditions:
        virtual: false
        main_ip: not_null
        snmp_ver: any_except
        snmp_ver_exclude: [0]
        role: [switch, router]
      target_field: main_ip
      labels:
        snmp: "true"
        node_ip: "{target_ip}"
        device: switch

    # ---- Network switches/routers without SNMP ----
    switch_no_snmp:
      conditions:
        virtual: false
        main_ip: not_null
        snmp_ver: 0
        role: [switch, router]
      target_field: main_ip
      labels:
        snmp: "false"
        node_ip: "{target_ip}"
        device: switch

    # ---- UPS with SNMP ----
    ups_snmp:
      conditions:
        virtual: false
        main_ip: not_null
        snmp_ver: any_except
        snmp_ver_exclude: [0]
        role: ups
      target_field: main_ip
      labels:
        snmp: "true"
        node_ip: "{target_ip}"
        device: ups

    # ---- UPS without SNMP ----
    ups_no_snmp:
      conditions:
        virtual: false
        main_ip: not_null
        snmp_ver: 0
        role: ups
      target_field: main_ip
      labels:
        snmp: "false"
        node_ip: "{target_ip}"
        device: ups

    # ---- Other equipment ----
    other_equipment_icmp:
      conditions:
        vendor: not_in
        vendor_exclude: [synology]
        main_ip: not_null
        os_type: null
        role: [pps, ip-video, terminal, video-transmission, sound, locker]
      target_field: main_ip
      labels:
        alloy: "false"
        node_ip: "{target_ip}"
        device: other

    # ---- Workstations ----
    workstations_icmp:
      conditions:
        model: [generic-ws]
        main_ip: not_null
      target_field: main_ip
      labels:
        alloy: "false"
        node_ip: "{target_ip}"
        device: other

    # ---- Wi-Fi access points ----
    wifi_icmp:
      conditions:
        virtual: false
        main_ip: not_null
        role: [wi-fi]
      target_field: main_ip
      labels:
        alloy: "false"
        node_ip: "{target_ip}"
        device: wi-fi

# ---------------------------------------------------------------------------
# Syslog-ng rewrite-rules generator
# ---------------------------------------------------------------------------
# The tool fully owns config_file and regenerates it from scratch each run.
# Make sure syslog-ng includes it via:
#   @include "/etc/syslog-ng/conf.d/*.conf"
# Then reference the rewrite rule in your log path:
#   log { source(s_net); rewrite(fix_hostnames); ... };
syslog:
  config_file: /etc/syslog-ng/conf.d/netbox2prom.conf
  block_name: fix_hostnames

  # Reload syslog-ng after config update.
  # Methods: http | signal | command | none
  reload:
    method: http
    address: "http://syslog-ng:601"
    # --- signal: send SIGHUP via PID file ---
    # method: signal
    # pid_file: /var/run/syslog-ng.pid
    # --- command: run arbitrary shell command ---
    # method: command
    # command: "syslog-ng-ctl reload"
    # --- none: skip reload (external watcher handles it) ---
    # method: none

  # Epilogue appended after all group rules inside the rewrite block.
  # Syslog-ng macros like ${HOST} are used as-is — no escaping needed.
  epilogue_template: |-
        set("${SOURCEIP}", value("HOST")
            condition("${HOST}" eq ""));

  groups:
    # Rewrite PROGRAM field for switches that send malformed hostnames.
    huawei_hpe_switches:
      conditions:
        role: switch
        vendor: [huawei, hpe]
        snmp_ver: any_except
        snmp_ver_exclude: [0]
      host_field: main_ip
      template: |-
            set("{name}", value("PROGRAM") \
                condition("${HOST}" eq "{ip}"));
