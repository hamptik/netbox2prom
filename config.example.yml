# ============================================================================
# netbox2prom configuration
# ============================================================================
# Copy this file to config.yml and adjust values for your environment.
# NetBox API token is NOT stored here — set the NETBOX_TOKEN env variable.
# ============================================================================

# ---------------------------------------------------------------------------
# NetBox connection
# ---------------------------------------------------------------------------
netbox:
  url: "https://netbox.example.com"
  tag: monitoring
  timeout: 30
  # Override API endpoints if your NetBox uses non-standard paths:
  # endpoints:
  #   devices: /api/dcim/devices/
  #   virtual_machines: /api/virtualization/virtual-machines/

# ---------------------------------------------------------------------------
# Prometheus scrape-config generator
# ---------------------------------------------------------------------------
prometheus:
  snmp_exporter_address: "snmp-exporter:9116"
  metrics_path: /snmp
  scrape_dir: /opt/configs/prometheus-scrape
  reload_address: "http://prometheus:9090"
  # reload_address: ""    # leave empty to skip reload

  # Default labels applied to every static_config target.
  # Placeholders: {name}, {target_ip}, {device_label}, {criticality},
  #               {os_type}, {vendor}, {model}, {role}, {snmp_ver}
  default_labels:
    instance: "{name}"
    criticality: "{criticality}"

  groups:
    # ---- IPMI / BMC (SNMPv3) ----
    snmpv3_ipmi_idrac-automated:
      conditions:
        vendor: dell
        oob_ip: not_null
        snmp_ver: 3
        virtual: false
        role: any_except
        role_exclude: [switch, ups, router]
      scrape_interval: 4m
      scrape_timeout: 2m
      params:
        auth: [public_v3_ipmi_auth]
        module: [system, ip_mib, dell_idrac]
      device_type: device
      vendor: dell
      ip_field: oob_ip

    snmpv3_ipmi_bmc-automated:
      conditions:
        vendor: gigabyte
        oob_ip: not_null
        snmp_ver: 3
        virtual: false
        role: any_except
        role_exclude: [switch, ups, router]
      scrape_interval: 4m
      scrape_timeout: 2m
      params:
        auth: [public_v3_ipmi_auth]
        module: [system, ip_mib, gigabyte]
      device_type: device
      vendor: gigabyte
      ip_field: oob_ip

    snmpv3_ipmi_hpe-automated:
      conditions:
        vendor: hpe
        oob_ip: not_null
        snmp_ver: 3
        virtual: false
        role: any_except
        role_exclude: [switch, ups, router]
      scrape_interval: 4m
      scrape_timeout: 2m
      params:
        auth: [public_v3_ipmi_auth]
        module: [system, ip_mib, hpe]
      device_type: device
      vendor: hpe
      ip_field: oob_ip

    snmpv3_ipmi_other-automated:
      conditions:
        vendor: any_except
        vendor_exclude: [gigabyte, hpe, dell]
        oob_ip: not_null
        snmp_ver: 3
        virtual: false
        role: any_except
        role_exclude: [switch, ups, router]
      scrape_interval: 4m
      scrape_timeout: 2m
      params:
        auth: [public_v3_ipmi_auth]
        module: [system, ip_mib]
      device_type: device
      vendor: other
      ip_field: oob_ip

    # ---- Network switches / routers ----
    snmpv3_network_huawei-automated:
      conditions:
        vendor: huawei
        snmp_ver: 3
        virtual: false
        role: [switch, router]
      scrape_interval: 4m
      scrape_timeout: 2m
      params:
        auth: [public_v3_network_auth_aes]
        module: [system, ip_mib, huawei]
